<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#050505"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#paint0_linear)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#050505"/>
  
  <text x="48%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="260" fill="url(#paint0_linear)" filter="url(#glow)">
    KP<tspan fill="#00f3ff">.</tspan>
  </text>
  
  <defs>
